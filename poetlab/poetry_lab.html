<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장면묘사 연습장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text-primary: #e8e4dc;
    --text-secondary: #7a7570;
    --text-muted: #3d3a37;
    --accent: #c8b89a;
    --accent-dim: #6b5d4a;
    --red: #c0392b;
    --green: #4a7c59;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 노이즈 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 32px;
    position: relative;
    z-index: 1;
  }

  /* 헤더 */
  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .site-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
  }

  .stage-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .stage-badge:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* 날짜 및 이미지 섹션 */
  .daily-section {
    padding: 48px 0 0;
  }

  .date-line {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }

  .image-frame {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .image-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .image-frame img.loaded {
    opacity: 1;
  }

  .image-frame .loading-state {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .image-credit {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    margin-bottom: 8px;
  }

  .image-credit a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .image-credit a:hover { color: var(--text-secondary); }

  /* 금지어 패널 */
  .constraint-panel {
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 32px;
    position: relative;
  }

  .constraint-panel::before {
    content: '오늘의 제약';
    position: absolute;
    top: -1px;
    left: 24px;
    transform: translateY(-50%);
    background: var(--bg);
    padding: 0 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .forbidden-words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .forbidden-word {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--red);
    border: 1px solid #3a1a18;
    padding: 3px 10px;
    opacity: 0.7;
    text-decoration: line-through;
    text-decoration-color: #5a2a28;
  }

  .constraint-note {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.6;
  }

  /* 글쓰기 영역 */
  .write-section {
    margin-bottom: 48px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .poem-textarea {
    width: 100%;
    min-height: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    line-height: 2;
    padding: 24px 28px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.02em;
  }

  .poem-textarea:focus {
    border-color: var(--accent-dim);
  }

  .poem-textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
    font-size: 13px;
  }

  /* 위반 감지 */
  .violation-alert {
    display: none;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--red);
    padding: 8px 12px;
    border-left: 2px solid var(--red);
    background: #1a0e0d;
  }

  /* 버튼 */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    align-items: center;
  }

  .btn-submit {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-submit:hover {
    background: var(--text-primary);
  }

  .btn-submit:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .btn-save {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border);
    padding: 12px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* 피드백 영역 */
  .feedback-section {
    display: none;
    border-top: 1px solid var(--border);
    padding-top: 48px;
    margin-bottom: 48px;
  }

  .feedback-section.visible { display: block; }

  .feedback-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .feedback-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    font-weight: 300;
    color: var(--text-secondary);
  }

  .feedback-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .feedback-body {
    font-size: 14px;
    line-height: 2;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }

  .feedback-body strong {
    color: var(--accent);
    font-weight: 400;
  }

  .feedback-loading {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    padding: 32px 0;
  }

  .loading-dot {
    width: 4px;
    height: 4px;
    background: var(--accent-dim);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* 기록 섹션 */
  .archive-section {
    border-top: 1px solid var(--border);
    padding-top: 48px;
    margin-bottom: 80px;
  }

  .archive-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .archive-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .archive-list {
    display: none;
  }

  .archive-list.open {
    display: block;
  }

  .archive-entry {
    border: 1px solid var(--border);
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .archive-entry:hover {
    border-color: var(--accent-dim);
  }

  .archive-entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
  }

  .archive-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .archive-preview {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: var(--text-muted);
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .archive-entry-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }

  .archive-entry-body.open {
    display: block;
  }

  .archive-poem {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 2;
    color: var(--text-secondary);
    padding: 20px 0;
    white-space: pre-wrap;
  }

  .archive-feedback-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 8px;
    display: inline-block;
  }

  .archive-feedback-content {
    display: none;
    margin-top: 16px;
    padding: 20px;
    background: var(--surface);
    font-size: 13px;
    line-height: 1.9;
    color: var(--text-muted);
    white-space: pre-wrap;
  }

  .archive-feedback-content.open { display: block; }

  /* 단계 전환 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    max-width: 480px;
    width: 90%;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    font-weight: 300;
    margin-bottom: 24px;
    color: var(--text-primary);
  }

  .stage-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .stage-option {
    border: 1px solid var(--border);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .stage-option:hover {
    border-color: var(--accent-dim);
  }

  .stage-option.active {
    border-color: var(--accent);
    background: #1a1612;
  }

  .stage-option .stage-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent-dim);
    min-width: 24px;
  }

  .stage-option .stage-name {
    font-size: 13px;
    color: var(--text-primary);
  }

  .stage-option .stage-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-style: italic;
  }

  .modal-close {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    padding: 10px 20px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .modal-close:hover {
    color: var(--text-primary);
    border-color: var(--accent-dim);
  }

  /* 구분선 */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 40px 0;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* 애니메이션 */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: fadeIn 0.4s ease forwards;
  }

  .refresh-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
    padding: 0;
  }

  .refresh-btn:hover { color: var(--accent); }

  /* 설정 버튼 */
  .settings-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    margin-left: 8px;
  }
  .settings-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* 설정 모달 내부 */
  .settings-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 20px;
    display: block;
  }
  .settings-label:first-of-type { margin-top: 0; }
  .provider-options { display: flex; gap: 8px; margin-top: 8px; }
  .provider-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border);
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .provider-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1612; }
  .provider-btn:hover { border-color: var(--accent-dim); }
  .settings-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    margin-top: 8px;
    transition: border-color 0.2s;
  }
  .settings-input:focus { border-color: var(--accent-dim); }
  .settings-save {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 24px;
    width: 100%;
  }
  .settings-save:hover { background: var(--text-primary); }
  .settings-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    font-style: italic;
    line-height: 1.6;
  }
  .api-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 2px 7px;
    margin-left: 8px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="site-title">장면 묘사 연습장 — 시작법 훈련</div>
    <div style="display:flex; align-items:center;">
      <div class="stage-badge" onclick="openModal()">
        <span id="stage-label">1단계: 장면 묘사</span>
      </div>
      <button class="settings-btn" onclick="openSettings()" title="AI 설정">⚙</button>
      <span id="api-badge" class="api-badge" style="display:none">연결됨</span>
    </div>
  </header>

  <!-- 데일리 섹션 -->
  <div class="daily-section">
    <div class="date-line" id="date-display"></div>

    <div class="image-frame" id="image-frame">
      <div class="loading-state" id="img-loading">이미지 불러오는 중...</div>
      <img id="daily-image" alt="오늘의 장면" onload="imageLoaded()" onerror="imageError()">
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
      <div class="image-credit" id="image-credit"></div>
      <button class="refresh-btn" onclick="loadNewImage()">↻ 다른 이미지</button>
    </div>

    <!-- 제약 패널 -->
    <div class="constraint-panel" id="constraint-panel">
      <div class="forbidden-words" id="forbidden-words"></div>
      <div class="constraint-note" id="constraint-note"></div>
    </div>

    <!-- 쓰기 영역 -->
    <div class="write-section">
      <div class="section-label">장면을 써라</div>
      <textarea
        class="poem-textarea"
        id="poem-input"
        placeholder="이미지를 보라. 거기 있는 것만 써라. 감정의 이름을 붙이지 마라."
        oninput="checkViolations(); updateCharCount()"
      ></textarea>
      <div class="violation-alert" id="violation-alert"></div>
      <div class="btn-row">
        <button class="btn-submit" id="submit-btn" onclick="submitPoem()">분석 요청</button>
        <button class="btn-save" onclick="saveOnly()">기록만 저장</button>
        <div class="char-count" id="char-count">0자</div>
      </div>
    </div>
  </div>

  <!-- 피드백 -->
  <div class="feedback-section" id="feedback-section">
    <div class="feedback-header">
      <div class="feedback-title">분석</div>
      <div class="feedback-meta" id="feedback-meta"></div>
    </div>
    <div class="feedback-loading" id="feedback-loading">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <span>분석 중</span>
    </div>
    <div class="feedback-body" id="feedback-body"></div>
  </div>

  <div class="divider"></div>

  <!-- 기록 -->
  <div class="archive-section">
    <div class="archive-header" onclick="toggleArchive()">
      <div class="section-label" style="margin:0">기록</div>
      <div class="archive-toggle" id="archive-toggle">펼치기 ↓</div>
    </div>
    <div class="archive-list" id="archive-list"></div>
  </div>
</div>

<!-- AI 설정 모달 -->
<div class="modal-overlay" id="settings-overlay" onclick="closeSettingsOutside(event)">
  <div class="modal">
    <div class="modal-title">AI 연결 설정</div>
    <span class="settings-label">AI 제공자</span>
    <div class="provider-options">
      <button class="provider-btn" id="prov-claude" onclick="selectProvider('claude')">Claude</button>
      <button class="provider-btn" id="prov-gpt" onclick="selectProvider('gpt')">GPT</button>
      <button class="provider-btn" id="prov-gemini" onclick="selectProvider('gemini')">Gemini</button>
    </div>
    <span class="settings-label" style="margin-top:20px">API 키</span>
    <input type="password" class="settings-input" id="settings-key" placeholder="API 키를 입력하세요">
    <div class="settings-hint" id="settings-hint"></div>
    <button class="settings-save" onclick="saveSettings()">저장</button>
    <div style="margin-top:12px; text-align:center">
      <button class="modal-close" onclick="closeSettings()">닫기</button>
    </div>
  </div>
</div>

<!-- 단계 전환 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">훈련 단계 선택</div>
    <div class="stage-options">
      <div class="stage-option active" id="stage-opt-1" onclick="setStage(1)">
        <div>
          <div style="display:flex; gap:16px; align-items:baseline">
            <span class="stage-num">01</span>
            <span class="stage-name">장면 묘사</span>
          </div>
          <div class="stage-desc">감정·관념어 금지. 하나의 사물로 하나의 장면.</div>
        </div>
      </div>
      <div class="stage-option" id="stage-opt-2" onclick="setStage(2)">
        <div>
          <div style="display:flex; gap:16px; align-items:baseline">
            <span class="stage-num">02</span>
            <span class="stage-name">거리 조율</span>
          </div>
          <div class="stage-desc">같은 장면을 안과 밖에서 각각 써라.</div>
        </div>
      </div>
      <div class="stage-option" id="stage-opt-3" onclick="setStage(3)">
        <div>
          <div style="display:flex; gap:16px; align-items:baseline">
            <span class="stage-num">03</span>
            <span class="stage-name">구조 설계</span>
          </div>
          <div class="stage-desc">형식을 먼저 결정하고 채워라.</div>
        </div>
      </div>
      <div class="stage-option" id="stage-opt-4" onclick="setStage(4)">
        <div>
          <div style="display:flex; gap:16px; align-items:baseline">
            <span class="stage-num">04</span>
            <span class="stage-name">퇴고</span>
          </div>
          <div class="stage-desc">쓴 시를 해부하라. 무엇이 작동하는가.</div>
        </div>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
// ── 상태 ──────────────────────────────────────────
let currentStage = 1;
let selectedProvider = localStorage.getItem('ai_provider') || 'claude';
let currentImageData = null;
let entries = JSON.parse(localStorage.getItem('poetry_entries') || '[]');
let archiveOpen = false;

// ── 단계별 설정 ─────────────────────────────────
const STAGES = {
  1: {
    label: '1단계: 장면 묘사',
    forbidden: ['슬프다','슬픔','슬퍼','허전','두렵','두려움','외롭','외로움','사랑','고통','절망','희망','공허','삶','죽음','그리움','아프다','아픔','기쁨','행복','불안','외로','쓸쓸'],
    note: '위의 단어들을 쓰지 마라. 감정은 사물과 행위로만 존재해야 한다.',
    placeholder: '이미지를 보라. 거기 있는 것만 써라. 감정의 이름을 붙이지 마라.',
    systemPrompt: `너는 냉정하고 날카로운 시 평론가다. 시인의 시를 분석한다.

분석 기준:
- 감정·관념어(슬픔, 두려움, 사랑, 고통, 절망, 희망 등)의 직접 사용 여부
- 장면과 사물의 구체성
- 마지막 행이 설명적인지 이미지로 끝나는지
- 작동하는 행과 작동하지 않는 행을 구체적으로 지적

형식:
- 3~5문단
- 건조하고 직접적인 어조
- 잘된 점 1~2가지, 개선할 점 1~2가지
- 마지막에 한 줄: 다음 시에서 시도할 것
- 한국어로 작성`
  },
  2: {
    label: '2단계: 거리 조율',
    forbidden: ['나는','내가','나의'],
    note: '화자를 직접 노출하지 마라. 장면이 화자를 대신한다.',
    placeholder: '같은 장면을 두 번 써라. 처음엔 그 안에서, 다음엔 바깥에서.',
    systemPrompt: `너는 냉정하고 날카로운 시 평론가다. 거리 조율 훈련 중인 시인의 시를 분석한다.

분석 기준:
- 화자와 장면 사이의 거리가 느껴지는가
- 안과 밖의 시점 차이가 언어에 반영되었는가
- 화자의 직접 노출 여부

한국어로 작성.`
  },
  3: {
    label: '3단계: 구조 설계',
    forbidden: [],
    note: '쓰기 전에 형식을 먼저 결정하라. 행 수, 연 수, 정보의 배치.',
    placeholder: '형식을 먼저 적어라. 그 다음 채워라.',
    systemPrompt: `너는 냉정하고 날카로운 시 평론가다. 구조 설계 훈련 중인 시인의 시를 분석한다.

분석 기준:
- 형식이 내용을 지지하는가, 아니면 충돌하는가
- 정보의 배치가 의도적인가
- 형식 자체가 의미를 생성하는 순간이 있는가

한국어로 작성.`
  },
  4: {
    label: '4단계: 퇴고',
    forbidden: [],
    note: '이전에 쓴 시를 붙여라. 스스로 해부하라.',
    placeholder: '퇴고할 시를 붙여넣고, 아래에 스스로의 진단을 써라.',
    systemPrompt: `너는 냉정하고 날카로운 시 평론가다. 시인이 스스로 퇴고 중인 시를 함께 분석한다.

- 시인의 자기 진단이 정확한지 평가하라
- 시인이 놓친 문제를 지적하라
- 구체적인 개정 방향을 제시하라

한국어로 작성.`
  }
};

// ── 이미지 소스 ─────────────────────────────────
// Unsplash API를 직접 사용 (무작위 자연/도시 장면)
const IMAGE_QUERIES = [
  'empty street', 'winter morning', 'old window', 'autumn leaves ground',
  'foggy forest', 'rain puddle', 'abandoned building', 'small boat water',
  'night alley', 'snow field', 'worn hands', 'old bridge',
  'dry grass', 'morning light room', 'stone wall', 'empty bench',
  'broken glass', 'shadow wall', 'rust metal', 'bare tree'
];

function getRandomQuery() {
  return IMAGE_QUERIES[Math.floor(Math.random() * IMAGE_QUERIES.length)];
}

function loadNewImage() {
  const query = getRandomQuery();
  const seed = Math.floor(Math.random() * 1000);
  const img = document.getElementById('daily-image');
  const loading = document.getElementById('img-loading');

  img.classList.remove('loaded');
  loading.style.display = 'flex';

  // Picsum Photos - 안정적인 무작위 이미지
  const imageId = 10 + Math.floor(Math.random() * 990);
  img.src = `https://picsum.photos/seed/${seed}/1200/675`;

  document.getElementById('image-credit').innerHTML =
    `<a href="https://picsum.photos" target="_blank">via Picsum Photos</a>`;
}

function imageLoaded() {
  document.getElementById('daily-image').classList.add('loaded');
  document.getElementById('img-loading').style.display = 'none';
}

function imageError() {
  document.getElementById('img-loading').textContent = '이미지를 불러올 수 없습니다. 다시 시도하세요.';
}

// ── 초기화 ────────────────────────────────────────
function init() {
  // 날짜
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko-KR', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
  });
  document.getElementById('date-display').textContent = dateStr;

  // 이미지
  loadNewImage();

  // 단계 설정
  applyStage(currentStage);

  // 기록 렌더
  renderArchive();

  // API 설정 상태
  updateApiBadge();
  if (!localStorage.getItem('ai_api_key')) openSettings();
}

function applyStage(stage) {
  const config = STAGES[stage];
  document.getElementById('stage-label').textContent = config.label;
  document.getElementById('poem-input').placeholder = config.placeholder;

  // 금지어
  const fw = document.getElementById('forbidden-words');
  fw.innerHTML = config.forbidden.map(w =>
    `<span class="forbidden-word">${w}</span>`
  ).join('');

  document.getElementById('constraint-note').textContent = config.note;

  // 금지어 없으면 패널 숨김
  document.getElementById('constraint-panel').style.display =
    config.forbidden.length ? 'block' : 'none';

  // 단계 옵션 active
  for (let i = 1; i <= 4; i++) {
    document.getElementById(`stage-opt-${i}`).classList.toggle('active', i === stage);
  }
}

// ── 위반 감지 ────────────────────────────────────
function checkViolations() {
  const text = document.getElementById('poem-input').value;
  const config = STAGES[currentStage];
  const violations = config.forbidden.filter(w => text.includes(w));

  const alert = document.getElementById('violation-alert');
  if (violations.length > 0) {
    alert.style.display = 'block';
    alert.textContent = `금지어 감지: ${violations.join(', ')}`;
    document.getElementById('submit-btn').disabled = false; // 제출은 허용하되 경고
  } else {
    alert.style.display = 'none';
  }
}

function updateCharCount() {
  const len = document.getElementById('poem-input').value.length;
  document.getElementById('char-count').textContent = `${len}자`;
}

// ── AI 호출 ──────────────────────────────────────
async function callAI(systemPrompt, userMsg) {
  const provider = localStorage.getItem('ai_provider') || 'claude';
  const apiKey = localStorage.getItem('ai_api_key') || '';

  if (!apiKey) {
    openSettings();
    throw new Error('API 키를 먼저 설정하세요.');
  }

  if (provider === 'claude') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`Claude 오류 ${res.status}: ${err.error?.message || res.statusText}`);
    }
    const data = await res.json();
    return data.content?.map(b => b.text || '').join('') || '';
  }

  if (provider === 'gpt') {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMsg }
        ]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`GPT 오류 ${res.status}: ${err.error?.message || res.statusText}`);
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '';
  }

  if (provider === 'gemini') {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: [{ parts: [{ text: userMsg }] }]
        })
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`Gemini 오류 ${res.status}: ${err.error?.message || res.statusText}`);
    }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  throw new Error('알 수 없는 제공자입니다.');
}

// ── 설정 모달 ────────────────────────────────────
const PROVIDER_HINTS = {
  claude: 'Anthropic Console → API Keys 에서 발급 (sk-ant-...)',
  gpt: 'OpenAI Platform → API Keys 에서 발급 (sk-...)',
  gemini: 'Google AI Studio → Get API key 에서 발급'
};

function openSettings() {
  selectedProvider = localStorage.getItem('ai_provider') || 'claude';
  document.getElementById('settings-key').value = localStorage.getItem('ai_api_key') || '';
  updateProviderUI();
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
}

function selectProvider(p) {
  selectedProvider = p;
  updateProviderUI();
}

function updateProviderUI() {
  ['claude', 'gpt', 'gemini'].forEach(p => {
    document.getElementById(`prov-${p}`).classList.toggle('active', p === selectedProvider);
  });
  document.getElementById('settings-hint').textContent = PROVIDER_HINTS[selectedProvider] || '';
}

function saveSettings() {
  const key = document.getElementById('settings-key').value.trim();
  if (!key) { alert('API 키를 입력하세요.'); return; }
  localStorage.setItem('ai_provider', selectedProvider);
  localStorage.setItem('ai_api_key', key);
  document.getElementById('api-badge').style.display = 'inline';
  closeSettings();
}

function updateApiBadge() {
  const hasKey = !!localStorage.getItem('ai_api_key');
  document.getElementById('api-badge').style.display = hasKey ? 'inline' : 'none';
}

// ── 제출 및 분석 ─────────────────────────────────
async function submitPoem() {
  const text = document.getElementById('poem-input').value.trim();
  if (!text) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '분석 중...';

  const feedbackSection = document.getElementById('feedback-section');
  feedbackSection.classList.add('visible');
  document.getElementById('feedback-loading').style.display = 'flex';
  document.getElementById('feedback-body').textContent = '';
  document.getElementById('feedback-meta').textContent = '';

  feedbackSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const config = STAGES[currentStage];
  const userMsg = `오늘의 이미지를 보고 쓴 시:\n\n${text}`;

  try {
    const feedback = await callAI(config.systemPrompt, userMsg);

    document.getElementById('feedback-loading').style.display = 'none';
    document.getElementById('feedback-body').textContent = feedback;
    document.getElementById('feedback-meta').textContent =
      new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    saveEntry(text, feedback);

  } catch (e) {
    document.getElementById('feedback-loading').style.display = 'none';
    document.getElementById('feedback-body').textContent = e.message || '오류가 발생했습니다. 다시 시도하세요.';
    if (!e.message?.includes('API 키')) saveEntry(text, null);
  }

  btn.disabled = false;
  btn.textContent = '분석 요청';
}

function saveOnly() {
  const text = document.getElementById('poem-input').value.trim();
  if (!text) return;
  saveEntry(text, null);
  alert('저장되었습니다.');
}

// ── 저장 ─────────────────────────────────────────
function saveEntry(poem, feedback) {
  const entry = {
    id: Date.now(),
    date: new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }),
    time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
    stage: currentStage,
    poem,
    feedback
  };
  entries.unshift(entry);
  localStorage.setItem('poetry_entries', JSON.stringify(entries));
  renderArchive();
}

// ── 기록 렌더 ────────────────────────────────────
function renderArchive() {
  const list = document.getElementById('archive-list');
  if (!entries.length) {
    list.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--text-muted);padding:20px 0;">아직 기록이 없다.</div>';
    return;
  }

  list.innerHTML = entries.map((e, i) => `
    <div class="archive-entry">
      <div class="archive-entry-header" onclick="toggleEntry(${i})">
        <div>
          <div class="archive-date">${e.date} ${e.time} · ${STAGES[e.stage]?.label || ''}</div>
          <div class="archive-preview">${e.poem.split('\n')[0]}</div>
        </div>
        <span style="font-family:DM Mono,monospace;font-size:10px;color:var(--text-muted)">↓</span>
      </div>
      <div class="archive-entry-body" id="entry-body-${i}">
        <div class="archive-poem">${e.poem}</div>
        ${e.feedback ? `
          <span class="archive-feedback-toggle" onclick="toggleFeedback(${i})">분석 보기 ↓</span>
          <div class="archive-feedback-content" id="entry-feedback-${i}">${e.feedback}</div>
        ` : '<div style="font-family:DM Mono,monospace;font-size:10px;color:var(--text-muted);margin-top:8px;">분석 없음</div>'}
      </div>
    </div>
  `).join('');
}

function toggleEntry(i) {
  const body = document.getElementById(`entry-body-${i}`);
  body.classList.toggle('open');
}

function toggleFeedback(i) {
  const fb = document.getElementById(`entry-feedback-${i}`);
  fb.classList.toggle('open');
}

function toggleArchive() {
  archiveOpen = !archiveOpen;
  document.getElementById('archive-list').classList.toggle('open', archiveOpen);
  document.getElementById('archive-toggle').textContent = archiveOpen ? '접기 ↑' : '펼치기 ↓';
}

// ── 모달 ─────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function setStage(n) {
  currentStage = n;
  applyStage(n);
  closeModal();
  document.getElementById('poem-input').value = '';
  document.getElementById('feedback-section').classList.remove('visible');
  updateCharCount();
  checkViolations();
}

// ── 시작 ─────────────────────────────────────────
init();
</script>
</body>
</html>
